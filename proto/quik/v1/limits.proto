syntax = "proto3";

package quik.v1;

option go_package = "github.com/boldlogic/portfolio-lens-quik/proto/gen/go/quik/v1;quikv1";

import "google/protobuf/timestamp.proto";

service LimitsService {
  rpc GetSecurityLimits(GetSecurityLimitsRequest) returns (GetSecurityLimitsResponse);
  rpc GetMoneyLimits(GetMoneyLimitsRequest) returns (GetMoneyLimitsResponse);
  rpc GetCurrentQuotes(GetCurrentQuotesRequest) returns (GetCurrentQuotesResponse);
  
  rpc StreamSecurityLimits(GetSecurityLimitsRequest) returns (stream SecurityLimit);
  rpc StreamMoneyLimits(GetMoneyLimitsRequest) returns (stream MoneyLimit);
  rpc StreamCurrentQuotes(GetCurrentQuotesRequest) returns (stream CurrentQuote);
  rpc StreamCurrentQuotesForKeys(GetCurrentQuotesForKeysRequest) returns (stream CurrentQuote);
}

message GetSecurityLimitsRequest {
  google.protobuf.Timestamp date = 1;
}

message GetSecurityLimitsResponse {
  repeated SecurityLimit limits = 1;
}

message GetMoneyLimitsRequest {
  google.protobuf.Timestamp date = 1;
}

message GetMoneyLimitsResponse {
  repeated MoneyLimit limits = 1;
}

message GetCurrentQuotesRequest {
  google.protobuf.Timestamp date = 1;
}

message GetCurrentQuotesResponse {
  repeated CurrentQuote quotes = 1;
}

message GetCurrentQuotesForKeysRequest {
  repeated string instrument_keys = 1;
}

message SecurityLimit {
  string client_code = 1;
  string ticker = 2;
  optional string isin = 3;
  string balance = 4;
  string acquisition_ccy = 5;
  string firm_code = 6;
  string firm_name = 7;
  string trade_account = 8;
  string settle_code = 9;
  google.protobuf.Timestamp source_date = 10;
  google.protobuf.Timestamp load_date = 11;
  optional string short_name = 12;
}

message MoneyLimit {
  string client_code = 1;
  string currency = 2;
  string balance = 3;
  string firm_code = 4;
  string firm_name = 5;
  string position_code = 6;
  string settle_code = 7;
  google.protobuf.Timestamp source_date = 8;
  google.protobuf.Timestamp load_date = 9;
}

message CurrentQuote {
  string ticker = 1;
  optional string isin = 2;
  optional string last_price = 3;
  optional string close_price = 4;
  optional string accrued_int = 5;
  optional string face_value = 6;
  string instrument_type = 7;
  string price_currency = 8;
  google.protobuf.Timestamp quote_date = 9;
  string accrued_currency = 10;
}
